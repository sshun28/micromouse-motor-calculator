<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>マイクロマウス用モータ計算機</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./src/app.mjs"></script>
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <h1>マイクロマウス用モータ計算機</h1>
      </header>

      <div class="layout">
        <form id="calculator-form" class="panel" novalidate>
          <div class="panel-heading">
            <h2>入力条件</h2>
          </div>

          <details class="saved-inputs">
            <summary>保存・呼び出し</summary>

            <div class="saved-inputs-body">
              <div class="saved-inputs-grid">
                <input
                  id="saved-input-name"
                  name="savedInputName"
                  type="text"
                  maxlength="50"
                  placeholder="保存名"
                  autocomplete="off"
                  aria-label="保存名"
                />

                <button id="save-input-button" class="action-button action-button-primary" type="button">保存</button>
              </div>

              <div class="saved-inputs-grid saved-inputs-grid-secondary">
                <select id="saved-input-select" name="savedInputSelect" aria-label="保存済み条件">
                  <option value="">保存済み条件はありません</option>
                </select>

                <div class="saved-input-actions">
                  <button id="load-input-button" class="action-button" type="button">呼び出す</button>
                  <button id="delete-input-button" class="action-button action-button-danger" type="button">削除</button>
                </div>
              </div>

              <p id="saved-status-message" class="status-message" aria-live="polite"></p>
            </div>
          </details>

          <fieldset class="form-section">
            <legend>車両パラメータ</legend>

            <label class="field">
              <span>重量 [g]</span>
              <input name="weightG" type="number" inputmode="decimal" step="0.1" value="30" required />
            </label>

            <label class="field">
              <span>慣性モーメント [g mm^2]</span>
              <input
                name="inertiaGmm2"
                type="number"
                inputmode="decimal"
                step="1"
                value="5000"
                required
              />
            </label>

            <label class="field">
              <span>タイヤ直径 [mm]</span>
              <input
                name="wheelDiameterMm"
                type="number"
                inputmode="decimal"
                step="0.1"
                value="13"
                required
              />
            </label>

            <div class="field">
              <span>減速比 [-]</span>
              <div class="ratio-inputs">
                <input
                  name="pinionTeeth"
                  type="number"
                  inputmode="decimal"
                  step="1"
                  value="13"
                  required
                  aria-label="ピニオン歯数"
                />
                <span class="ratio-separator">:</span>
                <input
                  name="spurTeeth"
                  type="number"
                  inputmode="decimal"
                  step="1"
                  value="61"
                  required
                  aria-label="スパー歯数"
                />
              </div>
              <small>ピニオン歯数 : スパー歯数</small>
            </div>

            <label class="field">
              <span>トレッド幅 [mm]</span>
              <input name="trackWidthMm" type="number" inputmode="decimal" step="0.1" value="35" required />
            </label>

            <label class="field">
              <span>電源電圧 [V]</span>
              <input name="supplyVoltageV" type="number" inputmode="decimal" step="0.01" value="9" required />
            </label>
          </fieldset>

          <fieldset class="form-section">
            <legend>モータパラメータ</legend>

            <label class="field">
              <span>発生電圧定数 [mV/rpm]</span>
              <input
                name="backEmfConstantMVRpm"
                type="number"
                inputmode="decimal"
                step="0.001"
                value="0.218"
                required
              />
            </label>

            <label class="field">
              <span>トルク定数 [mNm/A]</span>
              <input
                name="torqueConstantMNmA"
                type="number"
                inputmode="decimal"
                step="0.001"
                value="2.08"
                required
              />
            </label>

            <label class="field">
              <span>端子間抵抗 [Ω]</span>
              <input name="terminalResistanceOhm" type="number" inputmode="decimal" step="0.001" value="10" required />
            </label>
          </fieldset>

          <fieldset class="form-section">
            <legend>動作点</legend>

            <label class="field">
              <span>速度 [m/s]</span>
              <input name="speedMps" type="number" inputmode="decimal" step="0.01" value="7" required />
            </label>

            <label class="field">
              <span>加速度 [m/s^2]</span>
              <input name="accelerationMps2" type="number" inputmode="decimal" step="0.01" value="40" required />
            </label>

            <label class="field">
              <span>角速度 [deg/s]</span>
              <input name="yawRateDegS" type="number" inputmode="decimal" step="0.1" value="0" required />
            </label>

            <label class="field">
              <span>角加速度 [deg/s^2]</span>
              <input
                name="yawAccelerationDegS2"
                type="number"
                inputmode="decimal"
                step="0.1"
                value="0"
                required
              />
            </label>
          </fieldset>

          <div class="form-actions">
            <p id="calc-status-message" class="status-message" aria-live="polite"></p>
          </div>
        </form>

        <section class="panel">
          <div class="panel-heading">
            <h2>計算結果</h2>
          </div>

          <div class="results-table-wrapper">
            <table class="results-table">
              <thead>
                <tr>
                  <th scope="col">項目</th>
                  <th scope="col">左モータ</th>
                  <th scope="col">右モータ</th>
                </tr>
              </thead>
              <tbody id="results-body"></tbody>
            </table>
          </div>

          <div id="totals" class="totals-grid"></div>
        </section>
      </div>
    </main>
  </body>
</html>
